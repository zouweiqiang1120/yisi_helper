pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropertiesFile = file("local.properties")
        println "Looking for local.properties at: ${localPropertiesFile.absolutePath}"
        if (localPropertiesFile.exists()) {
            println "local.properties found!"
            localPropertiesFile.withInputStream { properties.load(it) }
            def sdkPath = properties.getProperty("flutter.sdk")
            println "flutter.sdk from local.properties: ${sdkPath}"
            if (sdkPath != null) {
                return sdkPath
            }
        } else {
            println "local.properties not found!"
        }
        // 如果在 local.properties 中找不到，尝试从环境变量获取
        def envFlutterPath = System.getenv("FLUTTER_ROOT")
        println "FLUTTER_ROOT from environment: ${envFlutterPath}"
        if (envFlutterPath != null) {
            return envFlutterPath
        }
        throw new GradleException("Flutter SDK not found. Please set flutter.sdk in local.properties or FLUTTER_ROOT environment variable.")
    }()

    println "Using Flutter SDK: ${flutterSdkPath}"
    includeBuild("${flutterSdkPath}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "7.3.0" apply false
    id "org.jetbrains.kotlin.android" version "1.7.10" apply false
}

include ":app"
