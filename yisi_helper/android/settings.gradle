pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropertiesFile = file("local.properties")
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withInputStream { properties.load(it) }
            def flutterSdkPath = properties.getProperty("flutter.sdk")
            if (flutterSdkPath != null) {
                return flutterSdkPath
            }
        }
        // 如果在 local.properties 中找不到，尝试从环境变量获取
        def envFlutterPath = System.getenv("FLUTTER_ROOT")
        if (envFlutterPath != null) {
            return envFlutterPath
        }
        // 尝试常见的 Flutter 安装路径
        def commonPaths = [
            "/opt/hostedtoolcache/flutter/stable-3.16.0-x64",
            "/usr/local/flutter",
            "C:\\flutter",
            "${System.getProperty('user.home')}/flutter"
        ]
        for (path in commonPaths) {
            if (file(path).exists()) {
                return path
            }
        }
        throw new GradleException("Flutter SDK not found. Please set flutter.sdk in local.properties or FLUTTER_ROOT environment variable.")
    }()

    includeBuild("${flutterSdkPath}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "7.4.2" apply false
    id "org.jetbrains.kotlin.android" version "1.8.22" apply false
}

include ":app"
