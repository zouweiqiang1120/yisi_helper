name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.9'
        channel: 'stable'
    
    - name: Setup Android
      working-directory: yisi_helper
      run: |
        flutter config --android-sdk ${ANDROID_SDK_ROOT}
        flutter doctor
    
    - name: Get dependencies
      working-directory: yisi_helper
      run: flutter pub get
    
    - name: Build APK
      working-directory: yisi_helper
      run: flutter build apk --release --verbose 2>&1 | tee build.log
      continue-on-error: true
    
    - name: Upload build log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: yisi_helper/build.log
    
    - name: Check APK
      run: |
        echo "=== Looking for APK ==="
        find yisi_helper -name "*.apk" -type f 2>/dev/null
        echo ""
        echo "=== Check all build outputs ==="
        ls -laR yisi_helper/build/app/outputs/ 2>/dev/null || echo "No outputs directory"
        echo ""
        echo "=== Check build directory ==="
        ls -la yisi_helper/build/ 2>/dev/null || echo "No build directory"
    
    - name: Copy APK to root
      run: |
        mkdir -p $GITHUB_WORKSPACE/apk-output
        cp yisi_helper/build/app/outputs/flutter-apk/*.apk $GITHUB_WORKSPACE/apk-output/ 2>/dev/null || echo "APK copy failed"
        ls -la $GITHUB_WORKSPACE/apk-output/
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: yisi-helper-apk
        path: apk-output/*.apk
