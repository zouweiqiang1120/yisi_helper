name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Check Flutter installation
      run: |
        echo "Flutter path: $(which flutter)"
        flutter --version
        echo "FLUTTER_ROOT: $FLUTTER_ROOT"
    
    - name: Fix permissions
      working-directory: yisi_helper
      run: |
        sudo chown -R $(whoami) .
        sudo chmod -R 755 .
    
    - name: Create local.properties
      working-directory: yisi_helper/android
      run: |
        echo "flutter.sdk=${FLUTTER_ROOT}" > local.properties
        echo "sdk.dir=/usr/local/lib/android/sdk" >> local.properties
        cat local.properties
    
    - name: Get dependencies
      working-directory: yisi_helper
      run: flutter pub get
    
    - name: Build APK with verbose output
      working-directory: yisi_helper
      run: |
        flutter build apk --release --verbose 2>&1 | tee build.log
        echo ""
        echo "=== Build Log Analysis ==="
        grep -i "error\|fail\|success\|apk" build.log || true
      continue-on-error: true
    
    - name: Check all build outputs
      run: |
        echo "=== Current Directory ==="
        pwd
        ls -la
        echo ""
        echo "=== yisi_helper Directory ==="
        ls -la yisi_helper/
        echo ""
        echo "=== Searching for APK files ==="
        find yisi_helper -name "*.apk" -type f 2>/dev/null || echo "No APK found in yisi_helper"
        echo ""
        echo "=== Searching for build directory ==="
        find yisi_helper -type d -name "build" 2>/dev/null || echo "No build directory found"
        echo ""
        echo "=== Full directory tree (limited) ==="
        tree -L 3 yisi_helper/ 2>/dev/null || find yisi_helper -maxdepth 3 -type d 2>/dev/null
    
    - name: Upload any APK found
      uses: actions/upload-artifact@v4
      with:
        name: yisi-helper-apk
        path: |
          yisi_helper/**/*.apk
          yisi_helper/build/app/outputs/**/*.apk
      if: always()
