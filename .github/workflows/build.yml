name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Extract and build
      run: |
        unzip -q yisi_helper.zip || true
        if [ -d "yisi_helper/yisi_helper" ]; then
          mv yisi_helper/yisi_helper/* yisi_helper/
          rmdir yisi_helper/yisi_helper
        fi
        cd yisi_helper
        flutter pub get
        flutter build apk --release
    - uses: actions/upload-artifact@v4
      with:
        name: yisi-helper-apk
        path: yisi_helper/build/app/outputs/flutter-apk/app-release.apk
