name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Check directory structure
      run: |
        echo "=== Current directory ==="
        pwd
        ls -la
        echo ""
        echo "=== Looking for yisi_helper ==="
        find . -maxdepth 3 -type d -name "yisi_helper" 2>/dev/null
        echo ""
        echo "=== Checking for nested yisi_helper ==="
        ls -la yisi_helper/ 2>/dev/null || echo "No yisi_helper directory"
        if [ -d "yisi_helper/yisi_helper" ]; then
          echo "NESTED DIRECTORY FOUND!"
          ls -la yisi_helper/yisi_helper/
        fi
    
    - name: Fix permissions
      working-directory: yisi_helper
      run: |
        sudo chown -R $(whoami) .
        sudo chmod -R 755 .
    
    - name: Create local.properties
      working-directory: yisi_helper/android
      run: |
        echo "flutter.sdk=${FLUTTER_ROOT}" > local.properties
        echo "sdk.dir=/usr/local/lib/android/sdk" >> local.properties
        cat local.properties
    
    - name: Get dependencies
      working-directory: yisi_helper
      run: flutter pub get
    
    - name: Build APK with verbose output
      working-directory: yisi_helper
      run: |
        set -x  # 显示执行的每条命令
        flutter build apk --release --verbose 2>&1 | tee build.log
        BUILD_EXIT_CODE=${PIPESTATUS[0]}
        echo "Build exit code: $BUILD_EXIT_CODE"
        exit $BUILD_EXIT_CODE
    
    - name: Check build outputs
      if: always()
      run: |
        echo "=== Current directory ==="
        pwd
        echo ""
        echo "=== Looking for build directory ==="
        find yisi_helper -type d -name "build" 2>/dev/null | head -5
        echo ""
        echo "=== Looking for APK files ==="
        find yisi_helper -name "*.apk" -type f 2>/dev/null
        echo ""
        echo "=== Build log tail ==="
        tail -100 yisi_helper/build.log 2>/dev/null || echo "No build.log found"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: yisi-helper-apk
        path: yisi_helper/build/app/outputs/flutter-apk/app-release.apk
