name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Move Flutter project to root
      run: |
        echo "=== Current directory ==="
        pwd
        ls -la
        echo ""
        echo "=== Moving yisi_helper contents to root ==="
        # 备份非 Flutter 文件
        mkdir -p _backup
        mv .git .github _backup/ 2>/dev/null || true
        # 移动 Flutter 项目到根目录
        mv yisi_helper/* .
        mv yisi_helper/.* . 2>/dev/null || true
        rmdir yisi_helper
        # 恢复备份
        mv _backup/.git . 2>/dev/null || true
        mv _backup/.github . 2>/dev/null || true
        rm -rf _backup
        echo ""
        echo "=== New directory structure ==="
        ls -la
    
    - name: Fix permissions
      run: sudo chown -R $(whoami) . && sudo chmod -R 755 .
    
    - name: Create local.properties
      run: |
        echo "flutter.sdk=${FLUTTER_ROOT}" > android/local.properties
        echo "sdk.dir=/usr/local/lib/android/sdk" >> android/local.properties
        cat android/local.properties
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Check build outputs
      if: always()
      run: |
        echo "=== Looking for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null
        echo ""
        echo "=== Build directory ==="
        ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "No APK directory"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: yisi-helper-apk
        path: build/app/outputs/flutter-apk/app-release.apk
