name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.9'
        channel: 'stable'
    
    - name: Setup Android
      working-directory: yisi_helper
      run: |
        flutter config --android-sdk ${ANDROID_SDK_ROOT}
        flutter doctor -v 2>&1 | tee flutter_doctor.log
    
    - name: Get dependencies
      working-directory: yisi_helper
      run: flutter pub get 2>&1 | tee pub_get.log
    
    - name: Build APK
      working-directory: yisi_helper
      run: flutter build apk --release 2>&1 | tee build.log
    
    - name: Upload logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs
        path: |
          yisi_helper/flutter_doctor.log
          yisi_helper/pub_get.log
          yisi_helper/build.log
    
    - name: Check APK
      run: |
        echo "=== Looking for APK ==="
        find yisi_helper -name "*.apk" -type f 2>/dev/null || echo "No APK found"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: yisi-helper-apk
        path: yisi_helper/build/app/outputs/flutter-apk/app-release.apk
    
    - name: Create Release
      if: success() && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.0+${{ github.run_number }}
        name: 易思助手 v1.0.0 (Build ${{ github.run_number }})
        body: |
          自动构建的 APK 文件
          
          构建时间: ${{ github.event.head_commit.timestamp }}
          提交: ${{ github.sha }}
        files: yisi_helper/build/app/outputs/flutter-apk/app-release.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
