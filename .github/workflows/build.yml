name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.9'
        channel: 'stable'
    
    - name: Find Flutter project
      run: |
        echo "=== Current directory ==="
        pwd
        ls -la
        echo ""
        echo "=== Looking for pubspec.yaml ==="
        find . -name "pubspec.yaml" -type f 2>/dev/null
        echo ""
        echo "=== Check yisi_helper directory ==="
        ls -la yisi_helper/ 2>/dev/null || echo "No yisi_helper directory"
    
    - name: Get dependencies
      working-directory: yisi_helper
      run: flutter pub get
    
    - name: Build APK
      working-directory: yisi_helper
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: yisi-helper-apk
        path: yisi_helper/build/app/outputs/flutter-apk/app-release.apk
