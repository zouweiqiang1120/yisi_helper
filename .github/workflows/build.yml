name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.9'
        channel: 'stable'
    
    - name: Check directory structure
      run: |
        echo "=== Root directory ==="
        pwd
        ls -la
        echo ""
        echo "=== yisi_helper directory ==="
        ls -la yisi_helper/
    
    - name: Get dependencies
      working-directory: ./yisi_helper
      run: flutter pub get
    
    - name: Build APK
      working-directory: ./yisi_helper
      run: flutter build apk --release
    
    - name: Find APK
      run: |
        echo "=== Looking for APK ==="
        find . -name "*.apk" -type f
        ls -la ./yisi_helper/build/app/outputs/flutter-apk/ 2>/dev/null || echo "No APK in expected location"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: yisi-helper-apk
        path: ./yisi_helper/build/app/outputs/flutter-apk/app-release.apk
