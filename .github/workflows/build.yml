name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.9'
        channel: 'stable'
    
    - name: Check directory structure
      run: |
        echo "=== Current directory ==="
        pwd
        ls -la
        echo ""
        echo "=== Check for pubspec.yaml ==="
        ls pubspec.yaml 2>/dev/null && echo "Found pubspec.yaml" || echo "No pubspec.yaml"
    
    - name: Create local.properties
      run: |
        echo "flutter.sdk=${FLUTTER_ROOT}" > android/local.properties
        echo "sdk.dir=${ANDROID_SDK_ROOT}" >> android/local.properties
        cat android/local.properties
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Find APK
      run: |
        echo "=== Looking for APK ==="
        find . -name "*.apk" -type f
        ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "No APK directory"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: yisi-helper-apk
        path: build/app/outputs/flutter-apk/app-release.apk
