name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Extract project
      run: |
        if [ -f "yisi_helper.zip" ]; then
          unzip -q yisi_helper.zip || true
          echo "PROJECT_DIR=yisi_helper" >> $GITHUB_ENV
        elif [ -f "pubspec.yaml" ]; then
          echo "PROJECT_DIR=." >> $GITHUB_ENV
        else
          echo "No project found"
          exit 1
        fi
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Build APK
      run: |
        cd ${{ env.PROJECT_DIR }}
        flutter pub get
        flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: yisi-helper-apk
        path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
