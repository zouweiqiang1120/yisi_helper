name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Check Flutter installation
      run: |
        echo "Flutter path: $(which flutter)"
        echo "Flutter version: $(flutter --version)"
        echo "FLUTTER_ROOT: $FLUTTER_ROOT"
    
    - name: Fix permissions
      working-directory: yisi_helper
      run: |
        sudo chown -R $(whoami) .
        sudo chmod -R 755 .
    
    - name: Create local.properties
      working-directory: yisi_helper/android
      run: |
        echo "flutter.sdk=${FLUTTER_ROOT}" > local.properties
        echo "sdk.dir=/usr/local/lib/android/sdk" >> local.properties
        cat local.properties
    
    - name: Get dependencies
      working-directory: yisi_helper
      run: flutter pub get
    
    - name: Build APK
      working-directory: yisi_helper
      run: flutter build apk --release
    
    - name: Find and check APK
      run: |
        echo "Searching for APK files..."
        find . -name "*.apk" -type f 2>/dev/null
        echo ""
        echo "Checking build directory structure..."
        ls -la yisi_helper/build/ 2>/dev/null || echo "No build directory"
        echo ""
        ls -la yisi_helper/build/app/ 2>/dev/null || echo "No app directory"
        echo ""
        ls -la yisi_helper/build/app/outputs/ 2>/dev/null || echo "No outputs directory"
        echo ""
        ls -la yisi_helper/build/app/outputs/flutter-apk/ 2>/dev/null || echo "No flutter-apk directory"
        echo ""
        ls -la yisi_helper/build/app/outputs/apk/ 2>/dev/null || echo "No apk directory"
    
    - name: Copy APK to known location
      run: |
        APK_PATH=$(find yisi_helper -name "*.apk" -type f | head -1)
        if [ -n "$APK_PATH" ]; then
          echo "Found APK at: $APK_PATH"
          mkdir -p yisi_helper/build/app/outputs/flutter-apk/
          cp "$APK_PATH" yisi_helper/build/app/outputs/flutter-apk/app-release.apk
          echo "APK copied successfully"
        else
          echo "No APK found!"
          exit 1
        fi
    
    - uses: actions/upload-artifact@v4
      with:
        name: yisi-helper-apk
        path: yisi_helper/build/app/outputs/flutter-apk/app-release.apk
