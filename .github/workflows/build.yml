name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Find Flutter project
      run: |
        echo "=== Current directory ==="
        pwd
        ls -la
        echo ""
        echo "=== Looking for pubspec.yaml ==="
        find . -name "pubspec.yaml" -type f 2>/dev/null
        echo ""
        echo "=== Check if pubspec.yaml exists in current dir ==="
        if [ -f "pubspec.yaml" ]; then
          echo "pubspec.yaml found in current directory"
          cat pubspec.yaml | head -20
        else
          echo "No pubspec.yaml in current directory"
        fi
        echo ""
        echo "=== Check for yisi_helper directory ==="
        if [ -d "yisi_helper" ]; then
          echo "yisi_helper directory exists:"
          ls -la yisi_helper/
        else
          echo "No yisi_helper directory"
        fi
    
    - name: Fix permissions
      run: sudo chown -R $(whoami) . && sudo chmod -R 755 .
    
    - name: Create local.properties
      run: |
        if [ -f "pubspec.yaml" ]; then
          echo "flutter.sdk=${FLUTTER_ROOT}" > android/local.properties
          echo "sdk.dir=/usr/local/lib/android/sdk" >> android/local.properties
          cat android/local.properties
        fi
    
    - name: Get dependencies
      run: |
        if [ -f "pubspec.yaml" ]; then
          flutter pub get
        else
          echo "No pubspec.yaml found!"
          exit 1
        fi
    
    - name: Build APK
      run: |
        if [ -f "pubspec.yaml" ]; then
          flutter build apk --release
        else
          echo "No pubspec.yaml found!"
          exit 1
        fi
    
    - name: Check build outputs
      if: always()
      run: |
        echo "=== Looking for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: yisi-helper-apk
        path: build/app/outputs/flutter-apk/app-release.apk
