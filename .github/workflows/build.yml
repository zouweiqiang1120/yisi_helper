name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        cache: true
    
    - name: Verify Flutter project
      run: |
        echo "=== Current directory ==="
        pwd
        ls -la yisi_helper/
        echo ""
        echo "=== pubspec.yaml ==="
        cat yisi_helper/pubspec.yaml | head -10
    
    - name: Fix permissions
      working-directory: yisi_helper
      run: |
        sudo chown -R $(whoami) .
        sudo chmod -R 755 .
    
    - name: Create local.properties
      working-directory: yisi_helper/android
      run: |
        echo "flutter.sdk=${FLUTTER_ROOT}" > local.properties
        echo "sdk.dir=/usr/local/lib/android/sdk" >> local.properties
        cat local.properties
    
    - name: Get dependencies
      working-directory: yisi_helper
      run: flutter pub get
    
    - name: Build APK
      working-directory: yisi_helper
      run: |
        flutter clean
        flutter pub get
        flutter build apk --release --verbose 2>&1 | tee build.log
      continue-on-error: true
    
    - name: Upload build log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: yisi_helper/build.log
    
    - name: Check build outputs
      if: always()
      run: |
        echo "=== Looking for APK files ==="
        find yisi_helper -name "*.apk" -type f 2>/dev/null
        echo ""
        echo "=== Build directory ==="
        ls -la yisi_helper/build/app/outputs/flutter-apk/ 2>/dev/null || echo "No APK directory"
        echo ""
        echo "=== All build outputs ==="
        ls -laR yisi_helper/build/app/outputs/ 2>/dev/null || echo "No outputs directory"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: yisi-helper-apk
        path: yisi_helper/build/app/outputs/flutter-apk/app-release.apk
