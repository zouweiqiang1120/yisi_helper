name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Check Flutter installation
      run: |
        echo "Flutter path: $(which flutter)"
        echo "Flutter version: $(flutter --version)"
        echo "FLUTTER_ROOT: $FLUTTER_ROOT"
    
    - name: Fix permissions
      working-directory: yisi_helper
      run: |
        sudo chown -R $(whoami) .
        sudo chmod -R 755 .
    
    - name: Create local.properties
      working-directory: yisi_helper/android
      run: |
        echo "flutter.sdk=${FLUTTER_ROOT}" > local.properties
        echo "sdk.dir=/usr/local/lib/android/sdk" >> local.properties
        cat local.properties
    
    - name: Get dependencies
      working-directory: yisi_helper
      run: flutter pub get
    
    - name: Build APK
      working-directory: yisi_helper
      run: flutter build apk --release --verbose
    
    - name: Check build output
      run: |
        echo "Checking build output..."
        find yisi_helper -name "*.apk" -type f 2>/dev/null || echo "No APK found"
        ls -la yisi_helper/build/app/outputs/flutter-apk/ 2>/dev/null || echo "Directory not found"
    
    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: yisi-helper-apk
        path: yisi_helper/build/app/outputs/flutter-apk/app-release.apk
