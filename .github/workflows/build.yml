name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Check and prepare project
      run: |
        ls -la
        if [ -f "yisi_helper.zip" ]; then
          echo "Extracting zip file..."
          unzip -o yisi_helper.zip
        fi
        echo "Project structure:"
        ls -la yisi_helper/
        ls -la yisi_helper/yisi_helper/ 2>/dev/null || echo "No nested folder"
    
    - name: Install dependencies
      working-directory: ./yisi_helper/yisi_helper
      run: flutter pub get
    
    - name: Build APK
      working-directory: ./yisi_helper/yisi_helper
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: yisi-helper-apk
        path: yisi_helper/yisi_helper/build/app/outputs/flutter-apk/app-release.apk
