name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.9'
        channel: 'stable'
    
    - name: Move project to root
      run: |
        echo "Before move:"
        pwd
        ls -la
        echo ""
        echo "Moving yisi_helper contents to current directory..."
        mv yisi_helper/* .
        mv yisi_helper/.* . 2>/dev/null || true
        rm -rf yisi_helper
        echo ""
        echo "After move:"
        ls -la
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: yisi-helper-apk
        path: build/app/outputs/flutter-apk/app-release.apk
