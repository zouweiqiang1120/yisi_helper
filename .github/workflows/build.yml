name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.9'
        channel: 'stable'
    
    - name: Setup Android
      working-directory: yisi_helper
      run: |
        flutter config --android-sdk ${ANDROID_SDK_ROOT}
        flutter doctor
    
    - name: Get dependencies
      working-directory: yisi_helper
      run: flutter pub get
    
    - name: Build APK
      working-directory: yisi_helper
      run: flutter build apk --release --verbose
      continue-on-error: true
    
    - name: Check APK
      run: |
        echo "=== Looking for APK ==="
        find yisi_helper -name "*.apk" -type f 2>/dev/null || echo "No APK found"
        ls -la yisi_helper/build/app/outputs/flutter-apk/ 2>/dev/null || echo "No APK directory"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: yisi-helper-apk
        path: yisi_helper/build/app/outputs/flutter-apk/app-release.apk
