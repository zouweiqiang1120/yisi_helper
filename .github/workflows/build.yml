name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Check directory structure
      run: |
        echo "=== Current directory ==="
        pwd
        ls -la
        echo ""
        echo "=== Check for yisi_helper directory ==="
        if [ -d "yisi_helper" ]; then
          echo "yisi_helper directory exists"
          ls -la yisi_helper/
        else
          echo "No yisi_helper directory found - using current directory"
        fi
    
    - name: Determine working directory
      id: workdir
      run: |
        if [ -d "yisi_helper" ] && [ -f "yisi_helper/pubspec.yaml" ]; then
          echo "dir=yisi_helper" >> $GITHUB_OUTPUT
          echo "Using yisi_helper as working directory"
        elif [ -f "pubspec.yaml" ]; then
          echo "dir=." >> $GITHUB_OUTPUT
          echo "Using current directory as working directory"
        else
          echo "Error: Cannot find pubspec.yaml"
          exit 1
        fi
    
    - name: Fix permissions
      run: sudo chown -R $(whoami) . && sudo chmod -R 755 .
    
    - name: Create local.properties
      run: |
        mkdir -p android
        echo "flutter.sdk=${FLUTTER_ROOT}" > android/local.properties
        echo "sdk.dir=/usr/local/lib/android/sdk" >> android/local.properties
        cat android/local.properties
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Check build outputs
      if: always()
      run: |
        echo "=== Looking for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null
        echo ""
        echo "=== Build directory ==="
        ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "No APK directory"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: yisi-helper-apk
        path: build/app/outputs/flutter-apk/app-release.apk
