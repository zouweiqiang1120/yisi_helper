name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Check Flutter installation
      run: |
        echo "Flutter path: $(which flutter)"
        flutter --version
        echo "FLUTTER_ROOT: $FLUTTER_ROOT"
    
    - name: Fix permissions
      working-directory: yisi_helper
      run: |
        sudo chown -R $(whoami) .
        sudo chmod -R 755 .
    
    - name: Create local.properties
      working-directory: yisi_helper/android
      run: |
        echo "flutter.sdk=${FLUTTER_ROOT}" > local.properties
        echo "sdk.dir=/usr/local/lib/android/sdk" >> local.properties
        cat local.properties
    
    - name: Get dependencies
      working-directory: yisi_helper
      run: flutter pub get
    
    - name: Build APK
      working-directory: yisi_helper
      run: |
        flutter build apk --release 2>&1
        echo "Build exit code: $?"
    
    - name: Check build outputs
      run: |
        echo "=== Current directory ==="
        pwd
        echo ""
        echo "=== yisi_helper directory ==="
        ls -la yisi_helper/
        echo ""
        echo "=== Looking for build directory ==="
        find yisi_helper -type d -name "build" 2>/dev/null | head -5
        echo ""
        echo "=== Looking for APK files ==="
        find yisi_helper -name "*.apk" -type f 2>/dev/null
        echo ""
        echo "=== If build exists, show structure ==="
        if [ -d "yisi_helper/build" ]; then
          echo "Build directory found!"
          ls -la yisi_helper/build/
          if [ -d "yisi_helper/build/app" ]; then
            ls -la yisi_helper/build/app/
            if [ -d "yisi_helper/build/app/outputs" ]; then
              ls -laR yisi_helper/build/app/outputs/
            fi
          fi
        else
          echo "No build directory found"
        fi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: yisi-helper-apk
        path: yisi_helper/build/app/outputs/flutter-apk/app-release.apk
