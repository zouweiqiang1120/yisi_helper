- name: Extract project from zip
      run: |
        echo "Current directory: $(pwd)"
        echo "Listing files:"
        ls -la
        echo ""
        
        # Check for zip file
        if [ -f "yisi_helper.zip" ]; then
          echo "Found yisi_helper.zip, extracting..."
          # Use Python to handle Windows-style zip files
          python3 << 'EOF'
        import zipfile
        import os
        
        with zipfile.ZipFile('yisi_helper.zip', 'r') as zip_ref:
            for member in zip_ref.namelist():
                # Convert Windows backslashes to forward slashes
                member_path = member.replace('\\', '/')
                if member_path.endswith('/'):
                    os.makedirs(member_path, exist_ok=True)
                else:
                    # Create directory if needed
                    dir_path = os.path.dirname(member_path)
                    if dir_path:
                        os.makedirs(dir_path, exist_ok=True)
                    # Extract file
                    with zip_ref.open(member) as source, open(member_path, 'wb') as target:
                        target.write(source.read())
        print("Extraction complete")
        EOF
          echo "Extracted contents:"
          ls -la
          
          # Check directory structure after extraction
          if [ -d "yisi_helper" ]; then
            echo "Found yisi_helper directory"
            PROJECT_DIR="yisi_helper"
          elif [ -f "pubspec.yaml" ]; then
            echo "Found pubspec.yaml in root"
            PROJECT_DIR="."
          else
            echo "ERROR: Cannot find Flutter project after extraction"
            exit 1
          fi
        elif [ -f "pubspec.yaml" ]; then
          echo "Found pubspec.yaml in root directory"
          PROJECT_DIR="."
        else
          echo "ERROR: No yisi_helper.zip or pubspec.yaml found"
          exit 1
        fi
        
        echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
        echo "Project directory set to: $PROJECT_DIR"
