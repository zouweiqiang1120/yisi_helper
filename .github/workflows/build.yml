name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Extract and fix project
      run: |
        echo "Current directory: $(pwd)"
        ls -la
        
        # Extract zip
        if [ -f "yisi_helper.zip" ]; then
          echo "Extracting yisi_helper.zip..."
          python3 -c "
import zipfile
import os
with zipfile.ZipFile('yisi_helper.zip', 'r') as zf:
    for item in zf.namelist():
        target = item.replace('\\\\', '/')
        if target.endswith('/'):
            os.makedirs(target, exist_ok=True)
        else:
            os.makedirs(os.path.dirname(target), exist_ok=True)
            with zf.open(item) as src, open(target, 'wb') as dst:
                dst.write(src.read())
"
          PROJECT_DIR="yisi_helper"
        elif [ -f "pubspec.yaml" ]; then
          PROJECT_DIR="."
        else
          echo "No project found"
          exit 1
        fi
        
        echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
        echo "Project dir: $PROJECT_DIR"
        
        # Fix Android v2 embedding
        cd $PROJECT_DIR
        rm -f android/app/build.gradle android/build.gradle android/settings.gradle
        rm -f android/gradle.properties android/local.properties
        
        # Create minimal android/build.gradle
        mkdir -p android
        echo 'buildscript {
    ext.kotlin_version = "1.9.0"
    repositories { google(); mavenCentral() }
    dependencies {
        classpath "com.android.tools.build:gradle:8.1.0"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}
allprojects { repositories { google(); mavenCentral() } }
rootProject.buildDir = "../build"
subprojects { project.buildDir = "${rootProject.buildDir}/${project.name}" }
tasks.register("clean", Delete) { delete rootProject.buildDir }' > android/build.gradle
        
        # Create settings.gradle
        echo 'pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set"
        return flutterSdkPath
    }()
    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
    repositories { google(); mavenCentral(); gradlePluginPortal() }
}
plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.0" apply false
}
include ":app"' > android/settings.gradle
        
        # Create app/build.gradle
        mkdir -p android/app
        echo 'plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}
android {
    namespace "com.example.yisi_helper"
    compileSdkVersion flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions { jvmTarget = "1.8" }
    sourceSets { main.java.srcDirs += "src/main/kotlin" }
    defaultConfig {
        applicationId "com.example.yisi_helper"
        minSdkVersion 21
        targetSdkVersion flutter.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled true
            shrinkResources true
        }
    }
}
flutter { source "../.." }
dependencies { implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version" }' > android/app/build.gradle
        
        # Create gradle.properties
        echo 'org.gradle.jvmargs=-Xmx4G
android.useAndroidX=true
android.enableJetifier=true' > android/gradle.properties
        
        # Create local.properties
        echo 'flutter.buildMode=release
flutter.versionName=1.0.0
flutter.versionCode=1' > android/local.properties
        
        echo "Android files created"
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
    
    - name: Build APK
      run: |
        cd ${{ env.PROJECT_DIR }}
        flutter pub get
        flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: yisi-helper-apk
        path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
        if-no-files-found: warn
