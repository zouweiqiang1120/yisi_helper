name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Check and fix directory structure
      run: |
        echo "=== Current directory ==="
        pwd
        ls -la
        echo ""
        echo "=== Check if we have nested yisi_helper ==="
        if [ -d "yisi_helper/yisi_helper" ]; then
          echo "NESTED DIRECTORY FOUND!"
          echo "Moving inner yisi_helper to current directory..."
          mv yisi_helper/yisi_helper yisi_helper_temp
          rm -rf yisi_helper
          mv yisi_helper_temp yisi_helper
          echo "Directory structure fixed!"
        else
          echo "No nested directory found"
        fi
        echo ""
        echo "=== Final directory structure ==="
        ls -la
        ls -la yisi_helper/
    
    - name: Fix permissions
      working-directory: yisi_helper
      run: |
        sudo chown -R $(whoami) .
        sudo chmod -R 755 .
    
    - name: Create local.properties
      working-directory: yisi_helper/android
      run: |
        echo "flutter.sdk=${FLUTTER_ROOT}" > local.properties
        echo "sdk.dir=/usr/local/lib/android/sdk" >> local.properties
        cat local.properties
    
    - name: Get dependencies
      working-directory: yisi_helper
      run: flutter pub get
    
    - name: Build APK
      working-directory: yisi_helper
      run: flutter build apk --release
    
    - name: Check build outputs
      if: always()
      run: |
        echo "=== Looking for APK files ==="
        find yisi_helper -name "*.apk" -type f 2>/dev/null
        echo ""
        echo "=== Build directory ==="
        ls -la yisi_helper/build/app/outputs/flutter-apk/ 2>/dev/null || echo "No APK directory"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: yisi-helper-apk
        path: yisi_helper/build/app/outputs/flutter-apk/app-release.apk
